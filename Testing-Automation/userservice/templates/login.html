{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFlow | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-light: #eef2ff;
      --bg-dark: #0f172a;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --white: #ffffff;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      outline: none;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Plus Jakarta Sans", sans-serif;
      overflow: hidden;
    }

    /* ===== ANIMATED GRADIENT BACKGROUND WITH IMAGE ===== */
    .background {
      position: fixed;
      inset: 0;
      background: url("{% static 'images/automaton_image.jpg' %}") center/cover no-repeat;
      z-index: -2;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 50%, rgba(240, 147, 251, 0.85) 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 1;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.3), transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(139, 92, 246, 0.3), transparent 50%);
      backdrop-filter: blur(3px);
      z-index: 2;
    }

    /* ===== FLOATING SHAPES ===== */
    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      animation: float 20s infinite ease-in-out;
      z-index: 3;
    }

    .shape-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape-2 {
      width: 200px;
      height: 200px;
      bottom: 15%;
      right: 15%;
      animation-delay: 5s;
    }

    .shape-3 {
      width: 150px;
      height: 150px;
      top: 60%;
      left: 70%;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }

    /* ===== LOGIN CENTER WRAPPER ===== */
    .login-wrapper {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    /* ===== MODERN LOGIN CARD WITH GLASS EFFECT ===== */
    .login-card {
      width: 100%;
      max-width: 460px;
      padding: 50px 45px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.25),
                  0 0 0 1px rgba(255, 255, 255, 0.3) inset;
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-area {
      font-size: 32px;
      font-weight: 800;
      color: var(--bg-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: -1px;
    }

    .logo-area i {
      color: var(--primary);
      font-size: 36px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .login-card p {
      margin: 0 0 40px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== FORM FIELDS ===== */
    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
      transition: color 0.2s;
    }

    input {
      width: 100%;
      height: 56px;
      padding: 0 18px 0 52px;
      font-size: 15px;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: #f8fafc;
      transition: all 0.3s ease;
      font-family: inherit;
      font-weight: 500;
    }

    input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    input:focus + i {
      color: var(--primary);
    }

    /* ===== SIGN IN BUTTON ===== */
    button {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 35px -5px rgba(99, 102, 241, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Alert Message Styling */
    .alert {
      font-size: 13px;
      font-weight: 600;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* ===== FOOTER TEXT ===== */
    .footer-text {
      margin-top: 30px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .login-card {
        padding: 40px 30px;
        max-width: 100%;
      }

      .logo-area {
        font-size: 26px;
      }

      .logo-area i {
        font-size: 28px;
      }

      input, button {
        height: 50px;
      }
    }
  </style>
</head>

<body>

<div class="background">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-area">
      <i class="fa-solid fa-bolt-lightning"></i> AUTOFLOW
    </div>
    <p>Sign in to manage your automation</p>

    <div id="login-error" class="alert">Invalid username or password.</div>

    <div class="input-group">
      <label for="username">Username</label>
      <div class="input-wrapper">
        <i class="fa-regular fa-user"></i>
        <input type="text" id="username" placeholder="Enter your username">
      </div>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
    </div>

    <button type="button" id="loginBtn">
      Sign In <i class="fa-solid fa-arrow-right"></i>
    </button>

    <div class="footer-text">
      Secure access to your automation platform
    </div>
  </div>
</div>

<script>
(function() {
  const loginBtn = document.getElementById("loginBtn");

  function generateSessionId() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "sess_" + Date.now() + "_" + Math.random().toString(16).slice(2);
  }

  loginBtn.addEventListener("click", function() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorDiv = document.getElementById("login-error");

    if (!username || !password) {
      errorDiv.style.display = "block";
      errorDiv.textContent = "Please enter both credentials.";
      return;
    }

    // Loading state
    const originalBtnText = loginBtn.innerHTML;
    loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...';
    loginBtn.style.pointerEvents = "none";

    fetch("/userserv/auth_token", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken")
      },
      body: JSON.stringify({
        user_name: username,
        password: password
      })
    })
    .then(response => {
      if (!response.ok) throw response;
      return response.json();
    })
    .then((data) => {
      // Always allow login in this browser; record a new local session id
      const sessionId = generateSessionId();
      const key = "activeUser_" + username;

      sessionStorage.setItem("username", username);
      sessionStorage.setItem("sessionId", sessionId);
      localStorage.setItem(key, JSON.stringify({ sessionId, ts: Date.now() }));

      if (data && data.token) {
        sessionStorage.setItem("authToken", data.token);
        if (data.expiry) sessionStorage.setItem("authTokenExpiry", data.expiry);
      }

      // Brief delay so auth_token request stays visible in DevTools Network tab before redirect
      setTimeout(() => {
        window.location.href = "/automationserv/template_summary-form/";
      }, 800);
    })
    .catch(async error => {
      loginBtn.innerHTML = originalBtnText;
      loginBtn.style.pointerEvents = "auto";
      errorDiv.style.display = "block";

      let errMsg = "Login failed!";
      if (error.json) {
        const errData = await error.json();
        errMsg = errData.description || errMsg;
      }
      errorDiv.textContent = errMsg;
    });
  });

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie) {
      document.cookie.split(";").forEach(cookie => {
        cookie = cookie.trim();
        if (cookie.startsWith(name + "=")) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        }
      });
    }
    return cookieValue;
  }
})();
</script>

</body>
</html>
