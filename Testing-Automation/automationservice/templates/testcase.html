            <td style="font-family:monospace; color:var(--text-muted);">${batchCode}</td>
            <td style="text-align:center;">${activityIcon}</td>
            <td style="text-align:center;">
              <div style="display: flex; align-items: center; justify-content: center; gap: 4px;">
                <i class="fa-solid fa-eye action-icon view-icon" data-action="view" data-id="${item.id}" title="View Report"></i>
                <i class="fa-solid fa-download action-icon download-icon" data-action="download" data-id="${item.id}" title="Download Report"></i>
              </div>
            </td>
          `;
          tableBody.appendChild(row);
        });
        
        tableContainer.style.display = "block";
      })
      .catch(err => {
        console.error('Error loading test_case_summary:', err);
        Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to load test case data.' });
      });
    }

    // Avoid double-restore (DOMContentLoaded + pageshow) which can cause duplicate renders.
    window.addEventListener("pageshow", (e) => {
      if (e && e.persisted) restoreRunProcessState();
    });
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("usernameDisplay").textContent = sessionStorage.getItem("username") || "Guest";
      
      // Check if we have a batch_code or testcode URL parameter (redirected from run summary)
      const urlParams = new URLSearchParams(window.location.search);
      const batchCodeParam = urlParams.get('batch_code');
      const testcodeParam = urlParams.get('testcode'); // Keep for backward compatibility
      
      if (batchCodeParam) {
        // Load data from batch code
        loadFromBatchCode(batchCodeParam,1);
      } else if (testcodeParam) {
        // Load data from test_case_summary API (backward compatibility)
        loadFromTestCaseSummary(testcodeParam);
      } else {
        // Check if we have a reset state to restore (came from reset button on run process page)
        const resetRunStateRaw = sessionStorage.getItem('resetRunState');
        if (resetRunStateRaw) {
          try {
            const resetRunState = JSON.parse(resetRunStateRaw);
            sessionStorage.removeItem('resetRunState');
            sessionStorage.removeItem('resetBatchCodes');

            // Restore dropdowns
            if (resetRunState.client) clientSelect.value = resetRunState.client;
            if (resetRunState.environment) environmentSelect.value = resetRunState.environment;
            if (resetRunState.module) moduleSelect.value = resetRunState.module;

            const codesToRestore = resetRunState.codes || [];

            if (codesToRestore.length > 0) {
              // First populate the dropdown with preselected codes, then fetch scenarios
              fetchTestcaseCodes(codesToRestore).then(() => {
                return fetchAndDisplayScenarios(codesToRestore);
              }).then(() => {
                // Override all statuses to "Yet to start"
                const rows = Array.from(document.querySelectorAll("#scenario-body tr"));
                rows.forEach(row => {
                  if (row.cells && row.cells.length >= 6) {
                    row.cells[2].textContent = "Yet to start";
                    row.cells[3].textContent = "Yet to start";
                    row.cells[5].innerHTML = "";
                  }
                });
              });
            }
          } catch(e) {
            console.error('Error restoring reset state:', e);
          }
          return;
        }

        // Normal flow: start fresh
        clientSelect.value = "";
        environmentSelect.value = "";
        moduleSelect.value = "";
        testcaseText.textContent = "Select Codes...";
        document.getElementById('testcase-items').innerHTML = "";
        tableBody.innerHTML = "";
        tableContainer.style.display = "none";
        console.log('Page loaded fresh - no URL parameters detected');
      }
    });

    // Event delegation for action icons
    document.getElementById('scenario-body').addEventListener('click', (e) => {
      const target = e.target;
      
      // Check if clicked element is an action icon
      if (target.classList.contains('action-icon')) {
        e.stopPropagation();
        e.preventDefault();
        
        const action = target.getAttribute('data-action');
        const recordId = target.getAttribute('data-id');
        
        if (!recordId) {
          Swal.fire({ icon: 'warning', title: 'No Record ID', text: 'No record ID available for this action' });
          return;
        }
        
        if (action === 'view') {
          // Call the view report API with the ID parameter
          console.log('Calling view report API for id:', recordId);
          
          authFetch(`/automationserv/view_report?id=${encodeURIComponent(recordId)}`, {
            method: "GET",
            cache: "no-store"
          })
          .then(res => {
            if (!res.ok) {
              throw new Error(`HTTP error! status: ${res.status}`);
            }
            return res.json();
          })
          .then(data => {
            console.log('View report API response:', data);
            
            // Handle the API response
            if (data.success !== false) {
              // Store the data in localStorage for the report view page
              if (data.records && Array.isArray(data.records)) {
                localStorage.setItem("reportData", JSON.stringify(data.records));
              } else if (data.data) {
                localStorage.setItem("reportData", JSON.stringify(data.data));
              } else {
                localStorage.setItem("reportData", JSON.stringify(data));
              }
              
              // Redirect to report view form with the ID
              window.location.href = `/automationserv/view_report-form/?id=${encodeURIComponent(recordId)}`;
            } else {
              Swal.fire({ 
                icon: 'info', 
                title: 'No Data', 
                text: data.message || 'No report data found for this record.' 
              });
            }
          })
          .catch(err => {
            console.error('Error calling view report API:', err);
            Swal.fire({ 
              icon: 'error', 
              title: 'Error', 
              text: `Failed to fetch report data: ${err.message}` 
            });
          });
        } else if (action === 'download') {
          // Download report PDF
          downloadReportPdf(recordId);
        }
      }
    });

    // Function to download report PDF
    function downloadReportPdf(recordId) {
      console.log('Downloading PDF for id:', recordId);
      
      authFetch(`/automationserv/trstreport?id=${encodeURIComponent(recordId)}`, {
        method: "GET",
        headers: { "X-CSRFToken": getCookie("csrftoken") }
      })
      .then(r => {
        console.log('PDF response received');
        return r.blob();
      })
      .then(blob => {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Report_${recordId}.pdf`;
        link.click();
      })
      .catch((err) => {
        console.error('PDF download error:', err);
        Swal.fire({ icon: 'error', title: 'Download Failed', text: 'Error downloading PDF report' });
      });
    }

    document.querySelector(".logout").onclick = () => { sessionStorage.clear(); window.location.href = "/userserv/authtoken-form/"; };
  </script>
</body>
</html>
