      <div class="form-group">

          <option value="" disabled selected>Choose Module</option>

          <option value="ECF">ECF</option>

      <div class="form-group">
        <label for="fromDate">From Date</label>
        <input type="date" id="fromDate">

<!--      <button class="animated-download-btn" title="Download">-->
<!--        <video src="download-button-animated-icon-in-lottie-json-gif-static-svg-file-formats&#45;&#45;gradient-call-to-action-buttons-pack-design-development-icons-7525576.mp4" autoplay loop muted playsinline></video>-->
<!--      </button>-->
      <button class="download-btn" title="Download">
        <svg xmlns="http://www.w3.org/2000/svg" height="30" width="30" fill="white" viewBox="0 0 24 24">
          <path d="M12 4v12m0 0l-6-6m6 6l6-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
<script>
    // --- SIMPLE TOKEN GUARD (frontend-only) ---
    (function enforceAuth() {
      const token = sessionStorage.getItem("authToken");
      if (!token) {
        sessionStorage.clear();
        window.location.href = "/userserv/authtoken-form/";
      }
    })();

    // --- AUTH-AWARE FETCH WRAPPER ---
    function authFetch(url, options = {}) {
      const token = sessionStorage.getItem("authToken");
      const merged = { credentials: "same-origin", ...(options || {}) };
      const baseHeaders = (options && options.headers) ? options.headers : {};
      merged.headers = { ...baseHeaders };
      if (token) merged.headers["Authorization"] = `Token ${token}`;
      return fetch(url, merged).then(res => {
        if (res.status === 401 || res.status === 403) {
          sessionStorage.clear();
          window.location.href = "/userserv/authtoken-form/";
          throw new Error("Unauthorized");
        }
        return res;
      });
    }
    document.querySelector(".download-btn").addEventListener("click", function () {
      const clientname = document.getElementById("clientName").value.trim();
      const module = document.getElementById("moduleName").value.trim();
      const from_date = document.getElementById("fromDate").value.trim();
      const to_date = document.getElementById("toDate").value.trim();

      if (!clientname || !module || !from_date || !to_date) {
        alert("Please enter all fields");
        return;
      }

      const url = `/automationserv/trstreport?clientname=${encodeURIComponent(clientname)}&module=${encodeURIComponent(module)}&fromdate=${encodeURIComponent(from_date)}&todate=${encodeURIComponent(to_date)}`;
      console.log("Fetching URL:", url);

      authFetch(url, {
        method: "GET",
        headers: {
          "X-CSRFToken": getCookie("csrftoken"),
        },
      })
        .then(response => {
          if (!response.ok) {
            throw new Error("Network response was not ok");
          }
          return response.blob();
        })
        .then(blob => {
          const link = document.createElement("a");
          link.href = window.URL.createObjectURL(blob);
          link.download = "report.pdf";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        })
        .catch(error => {
          console.error("Error:", error);
          alert("❌ Error: Something went wrong downloading the PDF!");
        });
    });

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === name + "=") {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
    document.addEventListener("DOMContentLoaded", function() {
  const user = sessionStorage.getItem("username") || "Guest";
  document.getElementById("usernameDisplay").textContent = user;
  });
  document.querySelector(".logout").addEventListener("click", function() {
    sessionStorage.clear();
    window.location.href = "/userserv/authtoken-form/";
  });
  </script>
